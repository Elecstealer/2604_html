<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 헤더 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        /* 로고 */
        .header-logo img {
            height: 20px;
        }

        .header-logo span {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #05141f;
            font-style: italic;
        }

        /* 중앙 네비게이션 */
        nav {
            display: flex;
            gap: 48px;
        }

        nav a {
            text-decoration: none;
            color: #05141f;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* 우측 영역 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #05141f;
        }

        .lang-toggle span.active {
            color: #05141f;
        }

        .lang-toggle span.inactive {
            color: #999;
        }

        .lang-divider {
            color: #ccc;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            stroke: #05141f;
            fill: none;
            stroke-width: 2;
        }

        /* 기존 콘텐츠 스타일 */
        .content {
            padding: 40px;
        }

        div.divWrap {background-color: skyblue; color: black;}
        p {background-color: blueviolet; color: white;}
        .text {background-color: transparent; color: black;}
    </style>
</head>
<body>

    <header>
        <!-- 로고 -->
        <div class="header-logo">
            <span>KIA</span>
        </div>

        <!-- 네비게이션 -->
        <nav>
            <a href="#">Brand</a>
            <a href="#">Design</a>
            <a href="#">Vehicle</a>
            <a href="#">Innovation</a>
            <a href="#">Newsroom</a>
        </nav>

        <!-- 우측: 언어 + 검색 -->
        <div class="header-right">
            <div class="lang-toggle">
                <span class="inactive">KR</span>
                <span class="lang-divider">|</span>
                <span class="active">EN</span>
            </div>
            <button class="search-btn" aria-label="검색">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="content">
        <h1>지금은 수업 중입니다</h1>
        <p class="text">이것은 html 수업이에요</p>
        <div class="divWrap"> test
            <p style="color: white;">4년동안 배우던 것을 복습하니까 조금 지루하네요</p>
        </div>
        <div style="background: black; color: aliceblue;">오잉 이것이 태그?</div>
    </div>

</body>
</html>
